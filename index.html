<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stroke Hemorrhage Risk Predictor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  /* ── Reset & base ─────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #f8f7f4;
    --surface:   #ffffff;
    --surface2:  #f2f0ec;
    --border:    rgba(0,0,0,0.10);
    --border2:   rgba(0,0,0,0.18);
    --text:      #1a1a18;
    --muted:     #6b6b66;
    --hint:      #9c9c96;
    --blue:      #185FA5;
    --blue-bg:   #E6F1FB;
    --green:     #3B6D11;
    --green-bg:  #EAF3DE;
    --amber:     #854F0B;
    --amber-bg:  #FAEEDA;
    --red:       #A32D2D;
    --red-bg:    #FCEBEB;
    --radius:    10px;
    --radius-lg: 14px;
  }

  [data-theme="dark"] {
    --bg:        #111110;
    --surface:   #1c1c1a;
    --surface2:  #252522;
    --border:    rgba(255,255,255,0.08);
    --border2:   rgba(255,255,255,0.14);
    --text:      #eeecea;
    --muted:     #888880;
    --hint:      #55554e;
    --blue:      #85B7EB;
    --blue-bg:   #0c2238;
    --green:     #97C459;
    --green-bg:  #182808;
    --amber:     #FAC775;
    --amber-bg:  #2a1c06;
    --red:       #F09595;
    --red-bg:    #2c0e0e;
  }

  [data-theme="dark"] .model-card.risk-high { border-color: #F09595; background: #2c0e0e; }
  [data-theme="dark"] .model-card.risk-mod  { border-color: #FAC775; background: #2a1c06; }
  [data-theme="dark"] .model-card.risk-low  { border-color: #97C459; background: #182808; }
  [data-theme="dark"] .mc-prob.c-high { color: #F09595; }
  [data-theme="dark"] .mc-prob.c-mod  { color: #FAC775; }
  [data-theme="dark"] .mc-prob.c-low  { color: #97C459; }
  [data-theme="dark"] .mc-badge.b-high { background: #3d1212; color: #F09595; }
  [data-theme="dark"] .mc-badge.b-mod  { background: #3d2a08; color: #FAC775; }
  [data-theme="dark"] .mc-badge.b-low  { background: #1e3808; color: #97C459; }
  [data-theme="dark"] .chip-high { background: #3d1212; color: #F09595; }
  [data-theme="dark"] .chip-mod  { background: #3d2a08; color: #FAC775; }
  [data-theme="dark"] .chip-low  { background: #1e3808; color: #97C459; }
  [data-theme="dark"] .pill.active     { background: #2c0e0e; border-color: #F09595; color: #F09595; }
  [data-theme="dark"] .pill.protective { background: #182808; border-color: #97C459; color: #97C459; }
  [data-theme="dark"] .disclaimer { background: #2a1c06; border-color: #FAC775; color: #FAC775; }
  [data-theme="dark"] .gf-lr  { background: #85B7EB; }
  [data-theme="dark"] .gf-rf  { background: #97C459; }
  [data-theme="dark"] .gf-xgb { background: #FAC775; }
  [data-theme="dark"] .toggle-btn:hover,
  [data-theme="dark"] .toggle-btn.active { background: #0c2238; border-color: #85B7EB; color: #85B7EB; }
  [data-theme="dark"] .gauge-model-lr  { color: #85B7EB !important; }
  [data-theme="dark"] .gauge-model-rf  { color: #97C459 !important; }
  [data-theme="dark"] .gauge-model-xgb { color: #FAC775 !important; }

  body {
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  /* ── Layout ───────────────────────────────────────────────────── */
  .container { max-width: 1080px; margin: 0 auto; }

  .page-header { margin-bottom: 2rem; }
  .page-title {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    font-weight: 400;
    color: var(--text);
    margin-bottom: .25rem;
  }
  .page-sub { font-size: 13px; color: var(--muted); }

  .disclaimer {
    background: var(--amber-bg);
    border: 0.5px solid #EF9F27;
    border-radius: var(--radius);
    padding: .65rem 1rem;
    font-size: 12px;
    color: var(--amber);
    margin-bottom: 1.5rem;
  }

  .app-grid {
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 1.25rem;
    align-items: start;
  }

  @media(max-width: 780px) {
    .app-grid { grid-template-columns: 1fr; }
  }

  /* ── Sidebar / Input Panel ────────────────────────────────────── */
  .input-panel {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem;
  }

  .panel-title {
    font-size: 12px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--hint);
    margin-bottom: 1rem;
  }

  .section-sep {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: .07em;
    color: var(--hint);
    margin: 1rem 0 .5rem;
    padding-top: .75rem;
    border-top: 0.5px solid var(--border);
  }
  .section-sep:first-of-type { border-top: none; padding-top: 0; margin-top: 0; }

  .field { margin-bottom: .7rem; }
  .field label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 3px;
  }
  .field input[type=number],
  .field select {
    width: 100%;
    padding: 7px 10px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    background: var(--surface2);
    color: var(--text);
    appearance: none;
    -webkit-appearance: none;
    outline: none;
    transition: border-color .15s;
  }
  .field input[type=number]:focus,
  .field select:focus { border-color: var(--blue); background: var(--surface); }

  .select-wrap { position: relative; }
  .select-wrap::after {
    content: '▾';
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 11px;
    color: var(--muted);
    pointer-events: none;
  }

  .toggle-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5px;
  }
  .toggle-btn {
    padding: 6px 8px;
    font-size: 11px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    cursor: pointer;
    background: var(--surface2);
    color: var(--muted);
    text-align: center;
    transition: all .15s;
    user-select: none;
    line-height: 1.3;
  }
  .toggle-btn:hover { background: var(--blue-bg); border-color: var(--blue); color: var(--blue); }
  .toggle-btn.active { background: var(--blue-bg); border-color: var(--blue); color: var(--blue); font-weight: 500; }

  .predict-btn {
    width: 100%;
    margin-top: 1.25rem;
    padding: 11px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    cursor: pointer;
    background: var(--text);
    color: var(--bg);
    transition: all .15s;
    letter-spacing: .01em;
  }
  .predict-btn:hover { opacity: .85; }
  .predict-btn:active { transform: scale(.99); }

  .reset-btn {
    width: 100%;
    margin-top: .5rem;
    padding: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    background: transparent;
    color: var(--muted);
    transition: all .15s;
  }
  .reset-btn:hover { background: var(--surface2); }

  /* ── Results Panel ────────────────────────────────────────────── */
  .results-panel { display: flex; flex-direction: column; gap: 1rem; }

  .placeholder-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 3rem 2rem;
    text-align: center;
    color: var(--hint);
  }
  .placeholder-card .ph-icon { font-size: 48px; margin-bottom: 1rem; opacity: .4; }
  .placeholder-card p { font-size: 14px; }

  /* ── Model Cards ──────────────────────────────────────────────── */
  .model-cards-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: .75rem;
  }
  @media(max-width:600px) { .model-cards-row { grid-template-columns: 1fr; } }

  .model-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.1rem 1.1rem;
    transition: border-color .2s;
  }
  .model-card.risk-high   { border-color: #E24B4A; background: var(--red-bg); }
  .model-card.risk-mod    { border-color: #EF9F27; background: var(--amber-bg); }
  .model-card.risk-low    { border-color: #97C459; background: var(--green-bg); }

  .mc-engine {
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--hint);
    margin-bottom: .6rem;
  }
  .mc-prob {
    font-family: 'DM Serif Display', serif;
    font-size: 36px;
    font-weight: 400;
    line-height: 1;
    margin-bottom: .4rem;
  }
  .mc-prob.c-high { color: var(--red); }
  .mc-prob.c-mod  { color: var(--amber); }
  .mc-prob.c-low  { color: var(--green); }

  .mc-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 500;
    padding: 2px 9px;
    border-radius: 99px;
    margin-bottom: .5rem;
  }
  .mc-badge.b-high { background: #F7C1C1; color: #791F1F; }
  .mc-badge.b-mod  { background: #FAC775; color: #633806; }
  .mc-badge.b-low  { background: #C0DD97; color: #27500A; }

  .mc-meta { font-size: 11px; color: var(--muted); }
  .mc-thresh { font-size: 10px; color: var(--hint); margin-top: 2px; }

  /* ── Gauge bars ───────────────────────────────────────────────── */
  .gauge-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.1rem 1.25rem;
  }
  .gauge-title { font-size: 12px; font-weight: 500; color: var(--muted); margin-bottom: .9rem; }

  .gauge-row { margin-bottom: .7rem; }
  .gauge-row:last-child { margin-bottom: 0; }
  .gauge-head {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-bottom: 4px;
  }
  .gauge-model { font-weight: 500; }
  .gauge-val   { color: var(--muted); }
  .gauge-track {
    height: 8px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
    border: 0.5px solid var(--border);
  }
  .gauge-fill {
    height: 100%;
    border-radius: 99px;
    transition: width .6s cubic-bezier(.4,0,.2,1);
  }
  .gf-lr  { background: #378ADD; }
  .gf-rf  { background: #639922; }
  .gf-xgb { background: #BA7517; }

  .gauge-thresh-line-wrap { position: relative; margin-top: -4px; height: 4px; }
  .thresh-tick {
    position: absolute;
    top: 0;
    width: 1px;
    height: 8px;
    background: rgba(0,0,0,.3);
    transform: translateX(-50%);
  }
  .thresh-label {
    position: absolute;
    top: 9px;
    font-size: 9px;
    color: var(--hint);
    transform: translateX(-50%);
    white-space: nowrap;
  }

  /* ── Consensus ────────────────────────────────────────────────── */
  .consensus-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.1rem 1.25rem;
  }
  .consensus-label {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: .07em;
    color: var(--hint);
    margin-bottom: .5rem;
  }
  .consensus-verdict {
    font-family: 'DM Serif Display', serif;
    font-size: 17px;
    font-weight: 400;
    margin-bottom: .4rem;
  }
  .consensus-desc { font-size: 13px; color: var(--muted); line-height: 1.6; }
  .avg-prob {
    margin-top: .75rem;
    font-size: 12px;
    color: var(--hint);
    padding-top: .65rem;
    border-top: 0.5px solid var(--border);
  }

  /* ── Factor pills ─────────────────────────────────────────────── */
  .factors-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
  }
  .factors-label {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: .07em;
    color: var(--hint);
    margin-bottom: .6rem;
  }
  .pill-grid { display: flex; flex-wrap: wrap; gap: 6px; }
  .pill {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 99px;
    border: 0.5px solid var(--border2);
    background: var(--surface2);
    color: var(--muted);
  }
  .pill.active { background: var(--red-bg); border-color: #E24B4A; color: var(--red); }
  .pill.protective { background: var(--green-bg); border-color: #97C459; color: var(--green); }
  .empty-factors { font-size: 13px; color: var(--hint); font-style: italic; }

  /* ── Metric table ─────────────────────────────────────────────── */
  .metrics-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
    overflow-x: auto;
  }
  .metrics-label {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: .07em;
    color: var(--hint);
    margin-bottom: .75rem;
  }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { text-align: left; font-weight: 500; color: var(--muted); padding: 4px 8px 8px 0; border-bottom: 0.5px solid var(--border); }
  td { padding: 7px 8px 7px 0; border-bottom: 0.5px solid var(--border); color: var(--text); }
  tr:last-child td { border-bottom: none; }
  .td-model { font-weight: 500; }
  .chip {
    display: inline-block;
    font-size: 10px;
    padding: 1px 7px;
    border-radius: 99px;
    font-weight: 500;
  }
  .chip-high { background: #F7C1C1; color: #791F1F; }
  .chip-mod  { background: #FAC775; color: #633806; }
  .chip-low  { background: #C0DD97; color: #27500A; }

  /* ── Footer ───────────────────────────────────────────────────── */
  .footer {
    margin-top: 2rem;
    font-size: 11px;
    color: var(--hint);
    line-height: 1.7;
    text-align: center;
    border-top: 0.5px solid var(--border);
    padding-top: 1.25rem;
  }

  /* ── Model Detail Table (new card design) ─────────────────────── */
  .mdt-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }
  .mdt-title {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: .07em;
    color: var(--hint);
  }
  .mdt-badge {
    font-size: 11px;
    padding: 2px 9px;
    border-radius: 99px;
    background: var(--green-bg);
    color: var(--green);
    border: 0.5px solid var(--green);
    font-weight: 500;
  }

  /* AUROC summary strip */
  .auroc-strip {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: .75rem;
    margin-bottom: .75rem;
  }
  .auroc-tile {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-
